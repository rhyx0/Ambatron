<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meme Pacman Chaos</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
background:#111;
color:white;
border:2px solid cyan;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:cyan;
color:black;
}

canvas{
background:black;
display:none;
margin:auto;
}

#score{
position:absolute;
top:10px;
left:10px;
font-size:20px;
display:none;
}

#analog{
position:absolute;
bottom:40px;
left:40px;
width:120px;
height:120px;
border-radius:50%;
border:3px solid white;
display:none;
}

#stick{
width:50px;
height:50px;
background:white;
border-radius:50%;
position:absolute;
top:35px;
left:35px;
}

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
padding:40px;
}

#popup img{
width:220px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 0 40px cyan;
}

#text{
max-width:700px;
font-size:20px;
line-height:1.6;
}

</style>
</head>

<body>

<div id="menu">
<h1>MEME PACMAN</h1>
<p>Capai skor 10 untuk mendapatkan ucapan spesial</p>

<button onclick="startGame('normal')">Game Mode</button>
<button onclick="startGame('chaos')">Chaos Mode</button>

</div>

<div id="score">Score: 0</div>

<canvas id="game" width="800" height="600"></canvas>

<div id="analog">
<div id="stick"></div>
</div>

<div id="popup">
<img src="mikel.jpg">
<p id="text"></p>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode="normal";

let pac={
x:400,
y:300,
speed:3,
angle:0,
mouth:0
};

let score=0;

let memes=[];
let memeImgs=[];

for(let i=1;i<=5;i++){
let img=new Image();
img.src="meme"+i+".jpg";
memeImgs.push(img);
}

function spawnMeme(){

memes.push({
x:Math.random()*760,
y:Math.random()*560,
img:memeImgs[Math.floor(Math.random()*5)],
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6
})

}

for(let i=0;i<5;i++)spawnMeme()

function startGame(selectedMode){

mode=selectedMode;

document.getElementById("menu").style.display="none";
canvas.style.display="block";
document.getElementById("score").style.display="block";
document.getElementById("analog").style.display="block";

loop();

}

function drawPac(){

pac.mouth+=0.1;

let open=(Math.sin(pac.mouth)+1)/4;

ctx.fillStyle="yellow";

ctx.beginPath();

ctx.moveTo(pac.x,pac.y);

ctx.arc(
pac.x,
pac.y,
20,
pac.angle+open,
pac.angle-open+Math.PI*2
);

ctx.fill();

}

function moveMemes(){

memes.forEach(m=>{

let dx=m.x-pac.x
let dy=m.y-pac.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<200){
m.vx+=dx/dist*0.2
m.vy+=dy/dist*0.2
}

m.x+=m.vx
m.y+=m.vy

if(m.x<0||m.x>780)m.vx*=-1
if(m.y<0||m.y>580)m.vy*=-1

ctx.drawImage(m.img,m.x,m.y,40,40)

if(dist<30){

score++
document.getElementById("score").innerText="Score: "+score

memes.splice(memes.indexOf(m),1)
spawnMeme()

if(score>=10){
showPopup()
}

}

})

}

function loop(){

ctx.clearRect(0,0,800,600)

drawPac()

moveMemes()

requestAnimationFrame(loop)

}

let dir={x:0,y:0}

function updateMove(){

pac.x+=dir.x*pac.speed
pac.y+=dir.y*pac.speed

pac.angle=Math.atan2(dir.y,dir.x)

}

setInterval(updateMove,16)

const analog=document.getElementById("analog")
const stick=document.getElementById("stick")

analog.addEventListener("touchmove",e=>{

let rect=analog.getBoundingClientRect()

let x=e.touches[0].clientX-rect.left-60
let y=e.touches[0].clientY-rect.top-60

let dist=Math.sqrt(x*x+y*y)

if(dist>50){
x=x/dist*50
y=y/dist*50
}

stick.style.left=(60+x-25)+"px"
stick.style.top=(60+y-25)+"px"

dir.x=x/50
dir.y=y/50

})

analog.addEventListener("touchend",()=>{

stick.style.left="35px"
stick.style.top="35px"

dir.x=0
dir.y=0

})

function showPopup(){

document.getElementById("popup").style.display="flex"

if(mode==="normal"){

document.getElementById("text").innerText=
"Seperti pepatah absurd yang entah datang dari mana mengatakan semoga yang disemogakan segera tersemogakan walaupun dunia kadang terasa seperti ambatron lalu berubah menjadi amba tukan kemudian muncul rusdi secara misterius dan akhirnya farhan kebab datang membawa kebahagiaan yang sama anehnya dengan perjalanan game ini."

}

if(mode==="chaos"){

document.getElementById("text").innerText=
"Di balik semua kekacauan kecil di game ini semoga yang disemogakan segera tersemogakan dalam hidupmu karena meskipun dunia kadang terasa seperti ambatron dan kadang berubah menjadi amba tukan dengan segala hal aneh seperti rusdi yang tiba tiba muncul atau farhan kebab yang datang di waktu tak terduga tetap ada harapan sederhana bahwa semua usaha kecil yang kamu lakukan hari ini suatu saat akan berubah menjadi sesuatu yang benar benar berarti."

}

}

</script>

</body>
  </html>
